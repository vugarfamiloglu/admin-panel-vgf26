<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="VGF26 — comprehensive admin panel template with 200+ UI components, light/dark themes, AZ/EN/RU i18n. Built with HTML, TailwindCSS, vanilla JS.">
  <title>VGF26 — Iridescent Admin Studio</title>

  <!-- Pre-paint theme so dark/light is set before first paint (no flash) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('vgf26-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'dark') document.documentElement.classList.add('dark');
        var lang = localStorage.getItem('vgf26-lang') || 'en';
        document.documentElement.setAttribute('lang', lang);
      } catch (_) {}
    })();
  </script>

  <!-- Tailwind via Play CDN — static template needs no build step. -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans:    ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Cal Sans"', '"DM Sans"', 'Inter', 'sans-serif'],
            mono:    ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          colors: {
            iris: {
              50:  '#f3edff', 100: '#e8dcff', 200: '#d4bbff', 300: '#b794ff',
              400: '#9568ff', 500: '#7c3aed', 600: '#6822da', 700: '#5618b5',
              800: '#421389', 900: '#2e0b5e', 950: '#1a063d',
            },
            fuchsia: {
              50: '#fdf2ff', 100: '#fae6ff', 500: '#d846ef', 600: '#c026d3', 700: '#a21caf',
            },
            cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' },
            ink: '#0b0a14',
          },
          boxShadow: {
            'glow':       '0 0 0 1px rgba(124, 58, 237, .15), 0 12px 32px -10px rgba(124, 58, 237, .25)',
            'glow-soft':  '0 1px 2px rgba(11, 10, 20, .04), 0 8px 24px -12px rgba(11, 10, 20, .08)',
            'inner-line': 'inset 0 0 0 1px rgba(255, 255, 255, .07)',
          },
          borderRadius: { 'xl2': '1.25rem' },
          keyframes: {
            'aurora-pan': { '0%,100%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' } },
            'pulse-soft': { '0%,100%': { opacity: '.55' }, '50%': { opacity: '1' } },
            'fade-up':    { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            'sheen':      { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(200%)' } },
          },
          animation: {
            'aurora':     'aurora-pan 14s ease-in-out infinite',
            'pulse-soft': 'pulse-soft 2.5s ease-in-out infinite',
            'fade-up':    'fade-up .4s ease-out both',
            'sheen':      'sheen 2.4s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>

<body class="font-sans antialiased text-ink dark:text-slate-100 bg-app">

  <!-- ── Background field ─────────────────────────────────────────── -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="aurora-blob aurora-blob--violet"></div>
    <div class="aurora-blob aurora-blob--fuchsia"></div>
    <div class="aurora-blob aurora-blob--cyan"></div>
    <div class="absolute inset-0 grain-overlay"></div>
  </div>

  <!-- ── App shell ────────────────────────────────────────────────── -->
  <div id="app-shell" class="flex min-h-screen">
    <!-- Sidebar mounts here -->
    <aside id="sidebar" class="sidebar"></aside>

    <div class="flex-1 min-w-0 flex flex-col">
      <!-- Topbar mounts here -->
      <header id="topbar" class="topbar"></header>

      <!-- Main content -->
      <main id="view" class="flex-1 px-4 sm:px-6 lg:px-8 py-6">
        <!-- Page contents are rendered here by the router. -->
      </main>

      <!-- Footer -->
      <footer id="footer" class="footer"></footer>
    </div>

    <!-- Mobile overlay -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-ink/55 backdrop-blur-sm z-30 hidden lg:!hidden"></div>
  </div>

  <!-- ── Toast / Modal / Command-Palette portals ──────────────────── -->
  <div id="toast-host" class="fixed top-4 right-4 z-[500] flex flex-col gap-2 max-w-sm pointer-events-none"></div>
  <div id="modal-host"></div>
  <div id="palette-host" class="hidden"></div>

  <!-- ── App scripts ──────────────────────────────────────────────── -->
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/views.js"></script>
  <script src="assets/js/views-extra.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
