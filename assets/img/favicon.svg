<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a063d"/>
      <stop offset="100%" stop-color="#5618b5"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ultra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="fuchsia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#d846ef"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- iridescent dark backdrop -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- faceted diamond / prism mark — four triangular facets, top-down pyramid view -->
  <g transform="translate(32 32)">
    <!-- top-left facet — iris -->
    <path d="M0,-20 L-18,-6 L0,0 Z" fill="url(#iris)"/>
    <!-- top-right facet — ultraviolet -->
    <path d="M0,-20 L18,-6 L0,0 Z" fill="url(#ultra)"/>
    <!-- bottom-left facet — cyan -->
    <path d="M-18,-6 L0,0 L0,20 Z" fill="url(#cyan)"/>
    <!-- bottom-right facet — fuchsia -->
    <path d="M18,-6 L0,0 L0,20 Z" fill="url(#fuchsia)"/>
    <!-- subtle white highlight along the top-left edge -->
    <path d="M0,-20 L-18,-6" stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- specular point -->
    <circle cx="-7" cy="-12" r="1.6" fill="rgba(255,255,255,0.85)"/>
  </g>
</svg>
